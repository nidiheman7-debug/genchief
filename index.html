<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream:  #F7F4EF;
      --ink:    #1C1C1C;
      --muted:  #888;
      --rule:   #D4CFC8;
      --accent: #C8432A;
      --correct:#2D6A4F;
      --wrong:  #C1121F;
      --cor-bg: #EAF4EE;
      --wrg-bg: #FDECEA;
      --serif:  'Playfair Display', Georgia, serif;
      --sans:   'DM Sans', 'Helvetica Neue', sans-serif;
    }
    /* 1. Clear color overrides for the dark theme */
body.dark-theme {
  --cream:  #121212;  /* Deep dark background */
  --ink:    #F5F5F5;  /* Light text */
  --muted:  #A0A0A0;  /* Secondary text */
  --rule:   #2A2A2A;  /* Dark subtle borders */
  
  /* Retain correct/wrong accent visibility but deepen background tints */
  --cor-bg: #1B3B2B;  
  --wrg-bg: #421C1F;
}

/* 2. Add smooth theme transition animations directly to your body */
body {
  background-color: var(--cream);
  color: var(--ink);
  transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  position: relative; /* Gives the toggle absolute alignment reference context */
}

/* 3. The precise floating top-right alignment styling rules */
.theme-toggle-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink);
  padding: 8px;
  border-radius: 50%; /* Perfect circular icon button wrapper */
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  transition: all 0.2s ease;
  z-index: 1000; /* Guarantees it floats over all screen layouts safely */
}

.theme-toggle-btn:hover {
  background-color: var(--rule);
}
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; border: none; background: none; cursor: pointer; }

    body {
      font-family: var(--serif);
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px;
    }

    /* ── Course picker ── */
    #course-screen { width:100%; max-width:700px; padding:48px 24px; animation:fadeUp .5s ease both; }

    .masthead { border-bottom:2px solid var(--ink); padding-bottom:16px; margin-bottom:48px; }
    .masthead-label { font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .masthead-title { font-family:var(--serif); font-size:clamp(32px,7vw,52px); font-weight:900; line-height:1.1; color:var(--ink); }
    .masthead-title em { font-style:italic; color:var(--accent); }

    .course-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:16px; }

    .course-card {
      border:1px solid var(--rule); padding:24px 20px; text-align:left;
      background:transparent; transition:border-color .2s, transform .2s, box-shadow .2s;
      position:relative; overflow:hidden;
    }
    .course-card::before {
      content:""; position:absolute; top:0; left:0;
      width:3px; height:0; background:var(--accent); transition:height .25s ease;
    }
    .course-card:hover { border-color:var(--ink); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.07); }
    .course-card:hover::before { height:100%; }
    .course-code { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
    .course-name { font-family:var(--serif); font-size:18px; color:var(--ink); line-height:1.35; }
    .course-meta { font-family:var(--sans); font-size:12px; color:var(--muted); margin-top:12px; }

    /* ── Quiz screen ── */
    #quiz-screen { display:none; width:100%; max-width:660px; padding:0 24px; }

    .quiz-nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 0 14px; margin-bottom:36px; border-bottom:2px solid var(--ink);
    }
    .back-btn { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); transition:color .2s; }
    .back-btn:hover { color:var(--ink); }
    .nav-course-code { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:5px; text-transform:uppercase; color:var(--ink); }
    .nav-progress { font-family:var(--sans); font-size:11px; color:var(--muted); letter-spacing:2px; }

    .dots-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:36px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--rule); transition:background .3s; }
    .dot.done { background:var(--ink); }
    .dot.current { background:var(--accent); }

    .ghost-num { font-family:var(--serif); font-size:clamp(80px,20vw,120px); font-weight:900; color:#EDE9E3; line-height:.85; margin-bottom:-18px; user-select:none; }

    .type-badge {
      display:inline-block; font-family:var(--sans); font-size:10px; font-weight:700;
      letter-spacing:3px; text-transform:uppercase; color:var(--cream);
      background:var(--ink); padding:4px 10px; margin-bottom:14px; position:relative; z-index:1;
    }

    .q-text { font-size:clamp(18px,3.5vw,24px); line-height:1.5; color:var(--ink); margin-bottom:32px; position:relative; z-index:1; }

    .options { list-style:none; }
    .opt-btn {
      width:100%; background:transparent; border:none; border-bottom:1px solid var(--rule);
      padding:16px 0; display:flex; align-items:center; gap:18px; text-align:left; transition:background .18s;
    }
    .options li:first-child .opt-btn { border-top:1px solid var(--rule); }
    .opt-btn:hover:not(:disabled) { background:rgba(0,0,0,.025); }
    .opt-btn:disabled { cursor:default; }
    .opt-letter { font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); width:24px; flex-shrink:0; transition:color .2s; }
    .opt-label  { font-family:var(--serif); font-size:17px; color:#555; flex:1; transition:color .2s; }
    .opt-icon   { font-size:16px; width:18px; text-align:center; opacity:0; transition:opacity .2s; }

    .opt-btn.selected .opt-letter { color:var(--ink); }
    .opt-btn.selected .opt-label  { color:var(--ink); font-weight:600; }
    .opt-btn.selected .opt-icon   { opacity:1; }

    .opt-btn.correct { background:var(--cor-bg); }
    .opt-btn.correct .opt-letter,
    .opt-btn.correct .opt-label,
    .opt-btn.correct .opt-icon { color:var(--correct); }
    .opt-btn.correct .opt-icon { opacity:1; }

    .opt-btn.wrong { background:var(--wrg-bg); }
    .opt-btn.wrong .opt-letter,
    .opt-btn.wrong .opt-label,
    .opt-btn.wrong .opt-icon { color:var(--wrong); }
    .opt-btn.wrong .opt-icon { opacity:1; }

    .footer {
      margin-top:28px; display:flex; justify-content:flex-end; align-items:center;
      gap:20px; min-height:52px; border-top:1px solid var(--rule); padding-top:20px;
    }
    .submit-btn {
      background:var(--ink); color:var(--cream); font-family:var(--sans); font-size:11px;
      font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:13px 32px;
      transition:background .2s, transform .15s;
    }
    .submit-btn:hover { background:#333; transform:translateY(-1px); }
    .result-msg { font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:1px; line-height:1.5; flex:1; animation:fadeUp .3s ease; }
    .result-msg.correct { color:var(--correct); }
    .result-msg.wrong   { color:var(--wrong); }
    .next-btn { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); text-decoration:underline; flex-shrink:0; transition:color .2s; }
    .next-btn:hover { color:var(--ink); }

    /* ── Score screen ── */
    #score-screen { display:none; width:100%; max-width:660px; padding:48px 24px; animation:fadeUp .5s ease both; }
    .score-header { border-bottom:2px solid var(--ink); padding-bottom:16px; margin-bottom:40px; }
    .score-label  { font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .score-course { font-family:var(--serif); font-size:28px; font-weight:700; color:var(--ink); }
    .score-big    { font-family:var(--serif); font-size:clamp(72px,20vw,110px); font-weight:900; line-height:1; color:var(--ink); margin-bottom:4px; }
    .score-sub    { font-family:var(--sans); font-size:14px; color:var(--muted); margin-bottom:28px; letter-spacing:1px; }
    .grade-pill   { display:inline-block; padding:8px 20px; margin-bottom:40px; }
    .score-actions { display:flex; gap:16px; flex-wrap:wrap; }
    .action-btn   { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:13px 28px; transition:background .2s, transform .15s; }
    .action-btn.primary   { background:var(--ink); color:var(--cream); }
    .action-btn.primary:hover { background:#333; transform:translateY(-1px); }
    .action-btn.secondary { border:1px solid var(--rule); color:var(--ink); }
    .action-btn.secondary:hover { border-color:var(--ink); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .quiz-animate { animation:fadeUp .4s ease both; }
  </style>
</head>
<body>
<body>
  <div id="course-screen">
     <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
    <div class="masthead">
      <div class="masthead-label">University Assessment</div>
      <h1 class="masthead-title">Choose a<br><em>Course</em> to Begin</h1>
    </div>
    <div class="course-grid" id="course-grid"></div>
  </div>

  <div id="quiz-screen">
    <div class="quiz-nav">
      <button class="back-btn" onclick="goHome()">&#8592; Courses</button>
      <span class="nav-course-code" id="nav-code"></span>
      <span class="nav-progress" id="nav-progress"></span>
    </div>
    <div class="dots-row" id="dots-row"></div>
    <div class="ghost-num" id="ghost-num"></div>
    <span class="type-badge" id="type-badge"></span>
    <p class="q-text" id="q-text"></p>
    <ul class="options" id="options-list"></ul>
    <div class="footer" id="footer"></div>
  </div>

  <div id="score-screen">
    <div class="score-header">
      <div class="score-label" id="score-label"></div>
      <div class="score-course" id="score-course"></div>
    </div>
    <div class="score-big" id="score-big"></div>
    <div class="score-sub" id="score-sub"></div>
    <div class="grade-pill" id="grade-pill"></div>
    <div class="score-actions">
      <button class="action-btn primary" onclick="retryQuiz()">Retry Quiz</button>
      <button class="action-btn secondary" onclick="goHome()">All Courses</button>
    </div>
  </div>

  <script>
    const courses = [
      {
        code:"GST 112", name:"Use of English & Communication Skills",
        questions:[
          {type:"mcq",text:"Which of the following is a synonym for 'verbose'?",options:["Concise","Wordy","Silent","Brief"],correct:1,explanation:"'Verbose' means using more words than necessary — wordy."},
          {type:"tf", text:"A topic sentence usually appears at the end of a paragraph.",options:["True","False"],correct:1,explanation:"A topic sentence typically appears at the beginning of a paragraph."},
          {type:"mcq",text:"The plural of 'criterion' is:",options:["Criterions","Criteria","Criterias","Criterium"],correct:1,explanation:"The correct plural of 'criterion' is 'criteria' (Latin origin)."},
          {type:"tf", text:"An abstract noun names something that can be seen or touched.",options:["True","False"],correct:1,explanation:"Abstract nouns name ideas or feelings that cannot be perceived physically."},
          {type:"mcq",text:"Which sentence is grammatically correct?",options:["Neither of the students were prepared.","Neither of the students was prepared.","Neither of the student was prepared.","Neither student were prepared."],correct:1,explanation:"'Neither' is singular; the correct verb form is 'was'."},
          {type:"tf", text:"A thesis statement expresses the main argument of an essay.",options:["True","False"],correct:0,explanation:"Yes — a thesis statement captures the central claim of the essay."},
          {type:"mcq",text:"Which rhetorical device involves repeating a word at the beginning of successive clauses?",options:["Anaphora","Metaphor","Hyperbole","Synecdoche"],correct:0,explanation:"Anaphora is the repetition of a word or phrase at the start of successive clauses."},
          {type:"tf", text:"'Its' and 'it\u2019s' mean the same thing.",options:["True","False"],correct:1,explanation:"'Its' is possessive; 'it\u2019s' is a contraction of 'it is'."},
          {type:"mcq",text:"Which of these is an example of a compound sentence?",options:["She ran fast.","She ran fast, and she won the race.","Running fast, she won.","She won because she ran fast."],correct:1,explanation:"A compound sentence joins two independent clauses with a coordinating conjunction."},
          {type:"tf", text:"In formal writing, contractions such as 'don't' are acceptable.",options:["True","False"],correct:1,explanation:"Contractions are generally avoided in formal academic writing."},
          {type:"mcq",text:"Which part of speech modifies a verb, adjective, or another adverb?",options:["Noun","Pronoun","Adverb","Preposition"],correct:2,explanation:"Adverbs modify verbs, adjectives, or other adverbs."},
          {type:"tf", text:"'Affect' is most commonly used as a verb.",options:["True","False"],correct:0,explanation:"'Affect' is typically a verb (to influence); 'effect' is typically a noun (a result)."},
          {type:"mcq",text:"The passive voice of 'The teacher marked the scripts' is:",options:["The scripts marked the teacher.","The scripts were marked by the teacher.","The teacher had marked the scripts.","The teacher is marking the scripts."],correct:1,explanation:"Passive voice: 'The scripts were marked by the teacher.'"},
          {type:"tf", text:"A bibliography and a reference list are exactly the same thing.",options:["True","False"],correct:1,explanation:"A bibliography lists all consulted works; a reference list includes only cited works."},
          {type:"mcq",text:"Which of the following is NOT a type of essay?",options:["Expository","Narrative","Locomotive","Argumentative"],correct:2,explanation:"'Locomotive' is not an essay type."}
        ]
      },
      {
        code:"BIO 102", name:"General Biology II",
        questions:[
          {type:"mcq",text:"Which organelle is known as the powerhouse of the cell?",options:["Nucleus","Ribosome","Mitochondria","Lysosome"],correct:2,explanation:"Mitochondria generate ATP through cellular respiration."},
          {type:"tf", text:"Photosynthesis occurs in the mitochondria.",options:["True","False"],correct:1,explanation:"Photosynthesis occurs in chloroplasts, not mitochondria."},
          {type:"mcq",text:"Which process directly produces gametes in animals?",options:["Mitosis","Meiosis","Binary fission","Budding"],correct:1,explanation:"Meiosis produces haploid gametes through two division stages."},
          {type:"tf", text:"DNA is double-stranded while RNA is single-stranded.",options:["True","False"],correct:0,explanation:"DNA is typically double-stranded; most RNA molecules are single-stranded."},
          {type:"mcq",text:"The basic unit of classification in taxonomy is:",options:["Genus","Family","Species","Kingdom"],correct:2,explanation:"Species is the fundamental unit of biological classification."},
          {type:"tf", text:"All bacteria are harmful to humans.",options:["True","False"],correct:1,explanation:"Many bacteria are beneficial — they aid digestion, fix nitrogen, and are used in food production."},
          {type:"mcq",text:"Which blood type is the universal donor?",options:["A","B","AB","O negative"],correct:3,explanation:"O negative red blood cells can be given to patients of any blood type."},
          {type:"tf", text:"Osmosis moves water from lower solute to higher solute concentration.",options:["True","False"],correct:0,explanation:"Osmosis moves water from lower solute (higher water potential) to higher solute concentration."},
          {type:"mcq",text:"Which of these is NOT a function of the skeletal system?",options:["Support","Hormone production","Protection","Movement"],correct:1,explanation:"Hormone production is the function of the endocrine system."},
          {type:"tf", text:"Enzymes are biological catalysts made of proteins.",options:["True","False"],correct:0,explanation:"Enzymes are proteins that speed up biochemical reactions."},
          {type:"mcq",text:"The process by which plants lose water through leaves is called:",options:["Respiration","Transpiration","Guttation","Evaporation"],correct:1,explanation:"Transpiration is the evaporation of water from plant leaves through stomata."},
          {type:"tf", text:"Viruses are considered living organisms.",options:["True","False"],correct:1,explanation:"Viruses lack cells and cannot reproduce independently."},
          {type:"mcq",text:"Which vitamin is synthesised by skin exposed to sunlight?",options:["Vitamin A","Vitamin B12","Vitamin C","Vitamin D"],correct:3,explanation:"The skin produces Vitamin D when exposed to UVB radiation."},
          {type:"tf", text:"The heart is part of the respiratory system.",options:["True","False"],correct:1,explanation:"The heart belongs to the circulatory system, not the respiratory system."},
          {type:"mcq",text:"Which nitrogenous base is in RNA but NOT in DNA?",options:["Adenine","Guanine","Uracil","Cytosine"],correct:2,explanation:"RNA contains uracil instead of thymine (found in DNA)."}
        ]
      },
      {
        code:"CHEM 102", name:"Organic Chemistry (Chapter I)",
        questions: [
  {
    "type": "mcq",
    "text": "Which of the following carbon compounds is NOT typically classified as an organic compound?",
    "options": ["Methane", "Ethanol", "Carbonate", "Glucose"],
    "correct": 2,
    "explanation": "Organic chemistry is the study of carbon compounds with the exception of oxides, sulphides, and carbonates of carbon."
  },
  {
    "type": "mcq",
    "text": "The tetravalent nature of carbon means it has how many valence electrons?",
    "options": ["2", "4", "6", "8"],
    "correct": 1,
    "explanation": "Carbon has a tetravalent nature, meaning it has 4 valence electrons and is able to bond with 4 different atoms."
  },
  {
    "type": "mcq",
    "text": "The ability of carbon atoms to join together to form a chain is known as:",
    "options": ["Catenation", "Conjugation", "Tetravalency", "Elucidation"],
    "correct": 0,
    "explanation": "Carbon exhibits catenation, which is the ability of carbon atoms to join together to form a chain (-C-C-)."
  },
  {
    "type": "mcq",
    "text": "Which type of bond is exclusively found in the alkane family?",
    "options": ["Only pie bonds", "Sigma (single) bond", "One sigma and one pie bond", "One sigma and two pie bonds"],
    "correct": 1,
    "explanation": "The bond in alkanes is a sigma (single) bond. Alkenes have a sigma and pie bond, while alkynes have one sigma and two pie bonds."
  },
  {
    "type": "mcq",
    "text": "Why do organic compounds generally fail to conduct electricity?",
    "options": ["They are highly flammable", "They have high melting points", "They contain mobile ions", "They are covalent and lack mobile ions or electrons"],
    "correct": 3,
    "explanation": "Organic compounds are covalent in nature; they exist as molecules and don't contain mobile ions or electrons, therefore they do not conduct electricity."
  },
  {
    "type": "mcq",
    "text": "Most organic compounds are insoluble in water. Which of the following is an exception due to the presence of hydrogen bonds?",
    "options": ["Petrol", "Ethanol", "Kerosene", "Rubber"],
    "correct": 1,
    "explanation": "Ethanol, glucose, and ethanoic acid are exceptions that are soluble in water because of the presence of hydrogen bonds."
  },
  {
    "type": "mcq",
    "text": "Unsaturated organic compounds are more chemically reactive than saturated ones primarily because of the presence of:",
    "options": ["Stronger covalent bonds", "Multiple bonds or more electrons", "Hydrogen bonds", "Oxygen atoms"],
    "correct": 1,
    "explanation": "Unsaturated compounds have multiple bonds (double or triple). The presence of more electrons makes them more chemically reactive than saturated compounds."
  },
  {
    "type": "mcq",
    "text": "Which spectroscopic analysis is primarily used to determine the functional group present in an organic compound?",
    "options": ["Ultraviolet/visible spectroscopy", "Nuclear Magnetic Resonance (NMR)", "Infra red spectroscopy (IR)", "Thin layer chromatography (TLC)"],
    "correct": 2,
    "explanation": "Infra red (IR) spectroscopy is used specifically to determine the functional group present in an organic compound."
  },
  {
    "type": "tf",
    "text": "Nuclear Magnetic Resonance (NMR) spectroscopy is used for the elucidation of the structures of organic compounds.",
    "options": ["True", "False"],
    "correct": 0,
    "explanation": "NMR is used for the elucidation (bringing out) of the structures of organic compounds."
  },
  {
    "type": "mcq",
    "text": "What is the general chemical formula for Alkanes?",
    "options": ["CnH2n", "CnH2n-2", "CnH2n+2", "CnH2n+1OH"],
    "correct": 2,
    "explanation": "The general chemical formula for the Alkane homologous series is CnH2n+2."
  },
  {
    "type": "mcq",
    "text": "The functional group -COOH is characteristic of which homologous series?",
    "options": ["Alkanols", "Alkanoic / carboxylic acids", "Alkanals", "Alkanoates"],
    "correct": 1,
    "explanation": "The -COOH group is the functional group for Alkanoic or carboxylic acids."
  },
  {
    "type": "mcq",
    "text": "Successive members of a homologous series differ by adjacent:",
    "options": ["-CH", "-CH2", "-CH3", "-OH"],
    "correct": 1,
    "explanation": "A key characteristic of a homologous series is that individual members (homologs) differ by adjacent -CH2 groups."
  },
  {
    "type": "tf",
    "text": "A functional group determines the main chemical properties of a homologous series.",
    "options": ["True", "False"],
    "correct": 0,
    "explanation": "A functional group is an atom, radical, or bond common to a series that directly determines its main chemical properties."
  },
  {
    "type": "mcq",
    "text": "Members of the same homologous series have the same:",
    "options": ["Physical properties", "Chemical properties", "Melting points", "Boiling points"],
    "correct": 1,
    "explanation": "Members of a homologous series share the same chemical properties, but they have different physical properties (like melting/boiling points)."
  },
  {
    "type": "mcq",
    "text": "The chemical formula CnH2n-2 represents which homologous series?",
    "options": ["Alkane", "Alkene", "Alkyne", "Alkanol"],
    "correct": 2,
    "explanation": "The Alkyne family is represented by the general molecular formula CnH2n-2."
  },
  {
      "type": "mcq",
      "text": "Who was the Swedish chemist that originally proposed the 'Vital Force Theory' in the early 19th century?",
      "options": ["Friedrich Wöhler", "Jöns Jacob Berzelius", "August Kekulé", "Antoine Lavoisier"],
      "correct": 1,
      "explanation": "Jöns Jacob Berzelius proposed the Vital Force Theory, postulating that organic compounds could only be generated within living organisms via a unique, non-reproducible 'vital force'."
    },
    {
      "type": "mcq",
      "text": "What did the Vital Force Theory state regarding the synthesis of organic molecules?",
      "options": [
        "They can only be synthesized from inorganic minerals in a laboratory.",
        "They can only be produced by living organisms and cannot be synthesized artificially.",
        "They are formed spontaneously in nature through volcanic activity.",
        "They require a high concentration of metallic catalysts to form."
      ],
      "correct": 1,
      "explanation": "The theory asserted that a mysterious 'vital force' inherent to living tissues (plants and animals) was absolute and essential to produce organic matter, making artificial laboratory synthesis impossible."
    },
    {
      "type": "mcq",
      "text": "In which year did German chemist Friedrich Wöhler successfully synthesize an organic compound from an inorganic starting material, fracturing the Vital Force Theory?",

    function showScreen(w) {
      courseScreen.style.display = w==="course" ? "block":"none";
      quizScreen.style.display   = w==="quiz"   ? "block":"none";
      scoreScreen.style.display  = w==="score"  ? "block":"none";
    }

    function buildGrid() {
      const grid = document.getElementById("course-grid");
      grid.innerHTML = "";
      courses.forEach((c,i) => {
        const btn = document.createElement("button");
        btn.className = "course-card";
        btn.innerHTML = `<div class="course-code">${c.code}</div><div class="course-name">${c.name}</div><div class="course-meta">${c.questions.length} questions &middot; Mix</div>`;
        btn.addEventListener("click", () => startQuiz(i));
        grid.appendChild(btn);
      });
    }

    function startQuiz(idx) {
      activeCourse = idx; qIndex = 0; score = 0;
      showScreen("quiz"); renderQuestion();
    }

    function renderQuestion() {
      const c = courses[activeCourse], q = c.questions[qIndex];
      const num = qIndex+1, tot = c.questions.length;
      selectedIdx = null; revealed = false;

      quizScreen.classList.remove("quiz-animate");
      void quizScreen.offsetWidth;
      quizScreen.classList.add("quiz-animate");

      document.getElementById("nav-code").textContent     = c.code;
      document.getElementById("nav-progress").innerHTML = `${num} / ${tot}`;

      const dr = document.getElementById("dots-row");
      dr.innerHTML = "";
      for(let i=0;i<tot;i++){
        const d=document.createElement("div");
        d.className="dot"+(i<qIndex?" done":i===qIndex?" current":"");
        dr.appendChild(d);
      }

      document.getElementById("ghost-num").textContent  = String(num).padStart(2,"0");
      document.getElementById("type-badge").textContent = q.type==="tf"?"True / False":"Multiple Choice";
      document.getElementById("q-text").innerHTML     = q.text;

      const ol=document.getElementById("options-list");
      ol.innerHTML="";
      const L=["A","B","C","D"];
      q.options.forEach((opt,i)=>{
        const li=document.createElement("li");
        const btn=document.createElement("button");
        btn.className="opt-btn";
        btn.dataset.i=i;
        btn.innerHTML=`<span class="opt-letter">${q.type==="tf"?"":L[i]}</span><span class="opt-label">${opt}</span><span class="opt-icon">&#9679;</span>`;
        btn.addEventListener("click",()=>handleSelect(i));
        li.appendChild(btn); ol.appendChild(li);
      });
      document.getElementById("footer").innerHTML="";
    }

    function handleSelect(idx) {
      if(revealed) return;
      selectedIdx=idx;
      document.querySelectorAll(".opt-btn").forEach(b=>{ b.classList.remove("selected"); b.querySelector(".opt-icon").innerHTML="&#9679;"; });
      const chosen=document.querySelectorAll(".opt-btn")[idx];
      chosen.classList.add("selected");
      const footer=document.getElementById("footer");
      footer.innerHTML="";
      const sub=document.createElement("button");
      sub.className="submit-btn"; sub.textContent="Submit";
      sub.addEventListener("click",handleReveal);
      footer.appendChild(sub);
    }

    function handleReveal() {
      if(selectedIdx===null) return;
      revealed=true;
      const q=courses[activeCourse].questions[qIndex];
      const allBtns=document.querySelectorAll(".opt-btn");
      const isRight=selectedIdx===q.correct;
      if(isRight) score++;
      allBtns.forEach(b=>{ b.disabled=true; b.classList.remove("selected"); });
      allBtns[q.correct].classList.add("correct");
      allBtns[q.correct].querySelector(".opt-icon").textContent="✓";
      if(!isRight){ allBtns[selectedIdx].classList.add("wrong"); allBtns[selectedIdx].querySelector(".opt-icon").textContent="✗"; }
      const footer=document.getElementById("footer");
      footer.innerHTML="";
      const msg=document.createElement("span");
      msg.className="result-msg "+(isRight?"correct":"wrong");
      msg.innerHTML=(isRight?"Correct! ":"Incorrect. ")+q.explanation;
      footer.appendChild(msg);
      const total=courses[activeCourse].questions.length;
      const nxt=document.createElement("button");
      nxt.className="next-btn";
      if(qIndex<total-1){
        nxt.textContent="Next \u2192";
        nxt.addEventListener("click",()=>{ qIndex++; renderQuestion(); });
      } else {
        nxt.textContent="Finish \u2192";
        nxt.addEventListener("click",showScore);
      }
      footer.appendChild(nxt);
    }

    function showScore() {
      const c=courses[activeCourse], total=c.questions.length;
      const pct=Math.round((score/total)*100);
      let grade,gc,gb;
      if(pct>=70){grade="Pass";gc="#2D6A4F";gb="#EAF4EE";}
      else if(pct>=50){grade="Average";gc="#7B5E00";gb="#FFF8E0";}
      else{grade="Below Pass";gc="#C1121F";gb="#FDECEA";}
      document.getElementById("score-label").textContent  = c.code+" \u00b7 Quiz Complete";
      document.getElementById("score-course").textContent = c.name;
      document.getElementById("score-big").textContent    = `${score}/${total}`;
      document.getElementById("score-sub").textContent    = `${pct}% \u2014 you answered ${score} question${score!==1?"s":""} correctly`;
      const pill=document.getElementById("grade-pill");
      pill.textContent=grade;
      Object.assign(pill.style,{background:gb,color:gc,fontFamily:"var(--sans)",fontSize:"12px",fontWeight:"700",letterSpacing:"3px",textTransform:"uppercase"});
      showScreen("score");
    }

    function retryQuiz(){ startQuiz(activeCourse); }
    function goHome(){ activeCourse=null; showScreen("course"); }

    buildGrid(); showScreen("course");
    // Self-contained theme management system
const themeToggler = document.getElementById("theme-toggle");

themeToggler.addEventListener("click", () => {
  document.body.classList.toggle("dark-theme");
  
  // Cache user selection settings
  if (document.body.classList.contains("dark-theme")) {
    localStorage.setItem("selectedTheme", "dark");
  } else {
    localStorage.setItem("selectedTheme", "light");
  }
});

// Immediately initialize user theme preference checks on bootup routines
if (localStorage.getItem("selectedTheme") === "dark") {
  document.body.classList.add("dark-theme");
}
  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream:  #F7F4EF;
      --ink:    #1C1C1C;
      --muted:  #888;
      --rule:   #D4CFC8;
      --accent: #C8432A;
      --correct:#2D6A4F;
      --wrong:  #C1121F;
      --cor-bg: #EAF4EE;
      --wrg-bg: #FDECEA;
      --serif:  'Playfair Display', Georgia, serif;
      --sans:   'DM Sans', 'Helvetica Neue', sans-serif;
    }
    /* 1. Clear color overrides for the dark theme */
body.dark-theme {
  --cream:  #121212;  /* Deep dark background */
  --ink:    #F5F5F5;  /* Light text */
  --muted:  #A0A0A0;  /* Secondary text */
  --rule:   #2A2A2A;  /* Dark subtle borders */
  
  /* Retain correct/wrong accent visibility but deepen background tints */
  --cor-bg: #1B3B2B;  
  --wrg-bg: #421C1F;
}

/* 2. Add smooth theme transition animations directly to your body */
body {
  background-color: var(--cream);
  color: var(--ink);
  transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  position: relative; /* Gives the toggle absolute alignment reference context */
}

/* 3. The precise floating top-right alignment styling rules */
.theme-toggle-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink);
  padding: 8px;
  border-radius: 50%; /* Perfect circular icon button wrapper */
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  transition: all 0.2s ease;
  z-index: 1000; /* Guarantees it floats over all screen layouts safely */
}

.theme-toggle-btn:hover {
  background-color: var(--rule);
}
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; border: none; background: none; cursor: pointer; }

    body {
      font-family: var(--serif);
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px;
    }

    /* ── Course picker ── */
    #course-screen { width:100%; max-width:700px; padding:48px 24px; animation:fadeUp .5s ease both; }

    .masthead { border-bottom:2px solid var(--ink); padding-bottom:16px; margin-bottom:48px; }
    .masthead-label { font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .masthead-title { font-family:var(--serif); font-size:clamp(32px,7vw,52px); font-weight:900; line-height:1.1; color:var(--ink); }
    .masthead-title em { font-style:italic; color:var(--accent); }

    .course-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:16px; }

    .course-card {
      border:1px solid var(--rule); padding:24px 20px; text-align:left;
      background:transparent; transition:border-color .2s, transform .2s, box-shadow .2s;
      position:relative; overflow:hidden;
    }
    .course-card::before {
      content:""; position:absolute; top:0; left:0;
      width:3px; height:0; background:var(--accent); transition:height .25s ease;
    }
    .course-card:hover { border-color:var(--ink); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.07); }
    .course-card:hover::before { height:100%; }
    .course-code { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
    .course-name { font-family:var(--serif); font-size:18px; color:var(--ink); line-height:1.35; }
    .course-meta { font-family:var(--sans); font-size:12px; color:var(--muted); margin-top:12px; }

    /* ── Quiz screen ── */
    #quiz-screen { display:none; width:100%; max-width:660px; padding:0 24px; }

    .quiz-nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 0 14px; margin-bottom:36px; border-bottom:2px solid var(--ink);
    }
    .back-btn { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); transition:color .2s; }
    .back-btn:hover { color:var(--ink); }
    .nav-course-code { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:5px; text-transform:uppercase; color:var(--ink); }
    .nav-progress { font-family:var(--sans); font-size:11px; color:var(--muted); letter-spacing:2px; }

    .dots-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:36px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--rule); transition:background .3s; }
    .dot.done { background:var(--ink); }
    .dot.current { background:var(--accent); }

    .ghost-num { font-family:var(--serif); font-size:clamp(80px,20vw,120px); font-weight:900; color:#EDE9E3; line-height:.85; margin-bottom:-18px; user-select:none; }

    .type-badge {
      display:inline-block; font-family:var(--sans); font-size:10px; font-weight:700;
      letter-spacing:3px; text-transform:uppercase; color:var(--cream);
      background:var(--ink); padding:4px 10px; margin-bottom:14px; position:relative; z-index:1;
    }

    .q-text { font-size:clamp(18px,3.5vw,24px); line-height:1.5; color:var(--ink); margin-bottom:32px; position:relative; z-index:1; }

    .options { list-style:none; }
    .opt-btn {
      width:100%; background:transparent; border:none; border-bottom:1px solid var(--rule);
      padding:16px 0; display:flex; align-items:center; gap:18px; text-align:left; transition:background .18s;
    }
    .options li:first-child .opt-btn { border-top:1px solid var(--rule); }
    .opt-btn:hover:not(:disabled) { background:rgba(0,0,0,.025); }
    .opt-btn:disabled { cursor:default; }
    .opt-letter { font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); width:24px; flex-shrink:0; transition:color .2s; }
    .opt-label  { font-family:var(--serif); font-size:17px; color:#555; flex:1; transition:color .2s; }
    .opt-icon   { font-size:16px; width:18px; text-align:center; opacity:0; transition:opacity .2s; }

    .opt-btn.selected .opt-letter { color:var(--ink); }
    .opt-btn.selected .opt-label  { color:var(--ink); font-weight:600; }
    .opt-btn.selected .opt-icon   { opacity:1; }

    .opt-btn.correct { background:var(--cor-bg); }
    .opt-btn.correct .opt-letter,
    .opt-btn.correct .opt-label,
    .opt-btn.correct .opt-icon { color:var(--correct); }
    .opt-btn.correct .opt-icon { opacity:1; }

    .opt-btn.wrong { background:var(--wrg-bg); }
    .opt-btn.wrong .opt-letter,
    .opt-btn.wrong .opt-label,
    .opt-btn.wrong .opt-icon { color:var(--wrong); }
    .opt-btn.wrong .opt-icon { opacity:1; }

    .footer {
      margin-top:28px; display:flex; justify-content:flex-end; align-items:center;
      gap:20px; min-height:52px; border-top:1px solid var(--rule); padding-top:20px;
    }
    .submit-btn {
      background:var(--ink); color:var(--cream); font-family:var(--sans); font-size:11px;
      font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:13px 32px;
      transition:background .2s, transform .15s;
    }
    .submit-btn:hover { background:#333; transform:translateY(-1px); }
    .result-msg { font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:1px; line-height:1.5; flex:1; animation:fadeUp .3s ease; }
    .result-msg.correct { color:var(--correct); }
    .result-msg.wrong   { color:var(--wrong); }
    .next-btn { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); text-decoration:underline; flex-shrink:0; transition:color .2s; }
    .next-btn:hover { color:var(--ink); }

    /* ── Score screen ── */
    #score-screen { display:none; width:100%; max-width:660px; padding:48px 24px; animation:fadeUp .5s ease both; }
    .score-header { border-bottom:2px solid var(--ink); padding-bottom:16px; margin-bottom:40px; }
    .score-label  { font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .score-course { font-family:var(--serif); font-size:28px; font-weight:700; color:var(--ink); }
    .score-big    { font-family:var(--serif); font-size:clamp(72px,20vw,110px); font-weight:900; line-height:1; color:var(--ink); margin-bottom:4px; }
    .score-sub    { font-family:var(--sans); font-size:14px; color:var(--muted); margin-bottom:28px; letter-spacing:1px; }
    .grade-pill   { display:inline-block; padding:8px 20px; margin-bottom:40px; }
    .score-actions { display:flex; gap:16px; flex-wrap:wrap; }
    .action-btn   { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:13px 28px; transition:background .2s, transform .15s; }
    .action-btn.primary   { background:var(--ink); color:var(--cream); }
    .action-btn.primary:hover { background:#333; transform:translateY(-1px); }
    .action-btn.secondary { border:1px solid var(--rule); color:var(--ink); }
    .action-btn.secondary:hover { border-color:var(--ink); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .quiz-animate { animation:fadeUp .4s ease both; }
  </style>
</head>
<body>
<body>
  <div id="course-screen">
     <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
    <div class="masthead">
      <div class="masthead-label">University Assessment</div>
      <h1 class="masthead-title">Choose a<br><em>Course</em> to Begin</h1>
    </div>
    <div class="course-grid" id="course-grid"></div>
  </div>

  <div id="quiz-screen">
    <div class="quiz-nav">
      <button class="back-btn" onclick="goHome()">&#8592; Courses</button>
      <span class="nav-course-code" id="nav-code"></span>
      <span class="nav-progress" id="nav-progress"></span>
    </div>
    <div class="dots-row" id="dots-row"></div>
    <div class="ghost-num" id="ghost-num"></div>
    <span class="type-badge" id="type-badge"></span>
    <p class="q-text" id="q-text"></p>
    <ul class="options" id="options-list"></ul>
    <div class="footer" id="footer"></div>
  </div>

  <div id="score-screen">
    <div class="score-header">
      <div class="score-label" id="score-label"></div>
      <div class="score-course" id="score-course"></div>
    </div>
    <div class="score-big" id="score-big"></div>
    <div class="score-sub" id="score-sub"></div>
    <div class="grade-pill" id="grade-pill"></div>
    <div class="score-actions">
      <button class="action-btn primary" onclick="retryQuiz()">Retry Quiz</button>
      <button class="action-btn secondary" onclick="goHome()">All Courses</button>
    </div>
  </div>

  <script>
    const courses = [
      {
        code:"GST 112", name:"Use of English & Communication Skills",
        questions:[
          {type:"mcq",text:"Which of the following is a synonym for 'verbose'?",options:["Concise","Wordy","Silent","Brief"],correct:1,explanation:"'Verbose' means using more words than necessary — wordy."},
          {type:"tf", text:"A topic sentence usually appears at the end of a paragraph.",options:["True","False"],correct:1,explanation:"A topic sentence typically appears at the beginning of a paragraph."},
          {type:"mcq",text:"The plural of 'criterion' is:",options:["Criterions","Criteria","Criterias","Criterium"],correct:1,explanation:"The correct plural of 'criterion' is 'criteria' (Latin origin)."},
          {type:"tf", text:"An abstract noun names something that can be seen or touched.",options:["True","False"],correct:1,explanation:"Abstract nouns name ideas or feelings that cannot be perceived physically."},
          {type:"mcq",text:"Which sentence is grammatically correct?",options:["Neither of the students were prepared.","Neither of the students was prepared.","Neither of the student was prepared.","Neither student were prepared."],correct:1,explanation:"'Neither' is singular; the correct verb form is 'was'."},
          {type:"tf", text:"A thesis statement expresses the main argument of an essay.",options:["True","False"],correct:0,explanation:"Yes — a thesis statement captures the central claim of the essay."},
          {type:"mcq",text:"Which rhetorical device involves repeating a word at the beginning of successive clauses?",options:["Anaphora","Metaphor","Hyperbole","Synecdoche"],correct:0,explanation:"Anaphora is the repetition of a word or phrase at the start of successive clauses."},
          {type:"tf", text:"'Its' and 'it\u2019s' mean the same thing.",options:["True","False"],correct:1,explanation:"'Its' is possessive; 'it\u2019s' is a contraction of 'it is'."},
          {type:"mcq",text:"Which of these is an example of a compound sentence?",options:["She ran fast.","She ran fast, and she won the race.","Running fast, she won.","She won because she ran fast."],correct:1,explanation:"A compound sentence joins two independent clauses with a coordinating conjunction."},
          {type:"tf", text:"In formal writing, contractions such as 'don't' are acceptable.",options:["True","False"],correct:1,explanation:"Contractions are generally avoided in formal academic writing."},
          {type:"mcq",text:"Which part of speech modifies a verb, adjective, or another adverb?",options:["Noun","Pronoun","Adverb","Preposition"],correct:2,explanation:"Adverbs modify verbs, adjectives, or other adverbs."},
          {type:"tf", text:"'Affect' is most commonly used as a verb.",options:["True","False"],correct:0,explanation:"'Affect' is typically a verb (to influence); 'effect' is typically a noun (a result)."},
          {type:"mcq",text:"The passive voice of 'The teacher marked the scripts' is:",options:["The scripts marked the teacher.","The scripts were marked by the teacher.","The teacher had marked the scripts.","The teacher is marking the scripts."],correct:1,explanation:"Passive voice: 'The scripts were marked by the teacher.'"},
          {type:"tf", text:"A bibliography and a reference list are exactly the same thing.",options:["True","False"],correct:1,explanation:"A bibliography lists all consulted works; a reference list includes only cited works."},
          {type:"mcq",text:"Which of the following is NOT a type of essay?",options:["Expository","Narrative","Locomotive","Argumentative"],correct:2,explanation:"'Locomotive' is not an essay type."}
        ]
      },
      {
        code:"BIO 102", name:"Plants and Animal cell", 
        questions:[
  {
    "type": "mcq",
    "text": "At the most fundamental structural level, plants and animals are classified into which cellular domain due to their shared internal complexity?",
    "options": [
      "Prokaryotes",
      "Eukaryotes",
      "Archaea",
      "Cyanobacteria"
    ],
    "correct": 1,
    "explanation": "Both plants and animals are composed of eukaryotic cells. This means their cells possess a true, membrane-bound nucleus that houses their genetic material, distinguishing them from prokaryotes.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Which fundamental life process is shared by both plants and animals to generate the usable energy required for survival?",
    "options": [
      "Anaerobic fermentation exclusively",
      "Photosynthetic carbon fixation",
      "Cellular respiration",
      "Nitrogen fixation"
    ],
    "correct": 2,
    "explanation": "While they obtain their food differently (photosynthesis vs. consumption), both plants and animals must break down that food via cellular respiration to produce usable energy in the form of ATP.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Which of the following organelles is present in BOTH plant and animal cells to act as the primary site of cellular respiration?",
    "options": [
      "Mitochondria",
      "Chloroplasts",
      "Lysosomes",
      "Centrioles"
    ],
    "correct": 0,
    "explanation": "Mitochondria are the 'powerhouses' of the eukaryotic cell. Both plant and animal cells rely on mitochondria to convert glucose and oxygen into ATP during aerobic respiration.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Despite their physical differences, how do both plants and animals encode their primary genetic instructions?",
    "options": [
      "Through complex lipid chains",
      "Using single-stranded RNA exclusively",
      "By using pure protein matrices",
      "Using DNA (deoxyribonucleic acid)"
    ],
    "correct": 3,
    "explanation": "DNA is the universal genetic blueprint for all eukaryotes. Both plant and animal cells store their genetic material as DNA organized into chromosomes within the nucleus.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Which organelle is shared by both plant and animal cells and functions as the primary site for protein synthesis?",
    "options": [
      "The central vacuole",
      "Ribosomes",
      "The cell wall",
      "Plastids"
    ],
    "correct": 1,
    "explanation": "Ribosomes are essential for translating genetic code into proteins. They are found floating freely in the cytoplasm or attached to the rough endoplasmic reticulum in both plant and animal cells.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Both plants and animals require a system to modify, sort, and package proteins and lipids for transport. Which shared organelle handles this task?",
    "options": [
      "Peroxisomes",
      "Lysosomes",
      "Golgi complex (apparatus)",
      "Nucleolus"
    ],
    "correct": 2,
    "explanation": "The Golgi complex is shared by both kingdoms. It acts like the cell's shipping center, receiving biochemicals from the ER, modifying them, and packaging them into vesicles for delivery.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "When a plant or animal organism is actively growing or replacing damaged tissues, which shared cellular process is taking place?",
    "options": [
      "Meiosis",
      "Mitosis",
      "Binary fission",
      "Budding"
    ],
    "correct": 1,
    "explanation": "Mitosis is the form of cell division that produces two genetically identical daughter cells. Both plants and animals use mitosis for general growth, development, and tissue repair.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Both kingdoms utilize sexual reproduction to create genetic diversity. Which specific cellular process must both undergo to produce gametes (sex cells)?",
    "options": [
      "Meiosis",
      "Plasmolysis",
      "Cytokinesis",
      "Phagocytosis"
    ],
    "correct": 0,
    "explanation": "Meiosis is a specialized form of cell division that halves the chromosome number to create gametes (like sperm/egg in animals, or pollen/ovules in plants) required for sexual reproduction.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Which organelle is a continuous network of folded membranes shared by both groups, crucial for synthesizing lipids and transporting materials?",
    "options": [
      "Endoplasmic Reticulum (ER)",
      "Chloroplast",
      "Centrosome",
      "Large Central Vacuole"
    ],
    "correct": 0,
    "explanation": "The Endoplasmic Reticulum (both smooth and rough) is a shared organelle system. The rough ER is studded with ribosomes for protein transport, while the smooth ER synthesizes lipids and detoxifies chemicals.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "What is the primary function of peroxisomes, an organelle found in both plant and animal cells?",
    "options": [
      "They store vast amounts of reserve water.",
      "They trap sunlight to generate raw glucose.",
      "They contain enzymes that break down fatty acids and detoxify harmful hydrogen peroxide.",
      "They organize the spindle fibers during cellular division."

    "correct": 2,
    "explanation": "Peroxisomes are shared metabolic compartments containing enzymes that break down fatty acids and safely convert toxic hydrogen peroxide (a metabolic byproduct) into water.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Though they lack a nervous system, plants still share which fundamental behavioral characteristic with animals?",
    "options": [
      "The ability to migrate over long distances.",
      "The capacity to respond to stimuli in their environment.",
      "The use of vocalizations for defense.",
      "The ability to hunt heterotrophically."
    ],
    "correct": 1,
    "explanation": "Sensitivity and response to stimuli are universal traits of living things. While animals might run from danger, plants respond to stimuli through tropisms (like growing toward a light source or altering internal hormones).",
    "image": ""

  {
    "type": "mcq",
    "text": "Which statement correctly describes the shared process of excretion in both plants and animals?",
    "options": [
      "Both eliminate metabolic waste products from their systems.",
      "Both utilize kidneys to filter out nitrogenous compounds.",
      "Neither produces toxic byproducts during cellular respiration.",
      "Both rely strictly on shedding their outer skin or bark."
    ],
    "correct": 0,
    "explanation": "Excretion is the removal of metabolic waste. While animals may use complex organs like kidneys, and plants may use stomata or store waste in dropping leaves, the fundamental need to eliminate waste is shared by both.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "What gel-like substance fills the interior of both plant and animal cells, providing a medium for chemical reactions?",
    "options": [
      "Cellulose",
      "Nucleoplasm",
      "Cytoplasm",
      "Stroma"
    ],
    "correct": 2,
    "explanation": "The cytoplasm is the jelly-like substance inside the cell membrane of both plant and animal cells that surrounds the organelles and serves as the site for many metabolic reactions.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Which boundary structure is universally present in BOTH plant and animal cells to control the movement of substances in and out of the cell?",
    "options": [
      "The cell wall",
      "The plasma (cell) membrane",
      "The nuclear envelope",
      "The plasmodesmata"
    ],
    "correct": 1,
    "explanation": "While only plants have a rigid cell wall, BOTH plant and animal cells are enclosed by a selectively permeable plasma membrane made of a phospholipid bilayer that regulates transport.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "To sustain life and build cellular structures, both plants and animals share a fundamental physiological need for:",
    "options": [
      "Direct sunlight absorption through the skin",
      "Constant consumption of other organisms",
      "Specific nutrients and biological macromolecules",
      "A permanent aquatic environment"
    ],
    "correct": 2,
    "explanation": "Whether they make it themselves (plants) or eat it (animals), both require essential nutrients and macromolecules like carbohydrates, proteins, lipids, and nucleic acids to survive.",

  {
    "type": "mcq",
    "text": "What role does RNA (Ribonucleic acid) play as a shared component in both plant and animal cells?",
    "options": [
      "It acts as a messenger and structural component to translate DNA into proteins.",
      "It forms the rigid structural backbone of the cell membrane.",
      "It exclusively stores long-term energy reserves.",
      "It permanently replaces DNA in mature adult cells."
    ],
    "correct": 0,
    "explanation": "RNA is essential in both kingdoms for gene expression. Messenger RNA (mRNA), transfer RNA (tRNA), and ribosomal RNA (rRNA) work together to translate the genetic code from DNA into functional proteins.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "Both plant and animal cells possess a nucleolus. Where is it located and what is its shared function?",
    "options": [
      "In the cytoplasm; it breaks down cellular waste.",
      "Inside the nucleus; it synthesizes ribosomal RNA (rRNA).",
      "On the cell membrane; it controls osmosis.",
      "Inside the mitochondria; it generates ATP."
    ],
    "correct": 1,
    "explanation": "The nucleolus is a dense region located inside the nucleus of eukaryotic cells. Its primary shared function is the transcription and assembly of ribosomal RNA (rRNA), which forms ribosomes.",
    "image": ""
  },
  {
    "type": "mcq",
    "text": "During the process of growth, what fundamental outcome is shared by both plants and animals?",
    "options": [
      "An increase in overall size and structural development over their lifespan.",

      "A steady decrease in total cell count as they age."

          {type:"mcq",text:"Which law states total momentum of a closed system is conserved?",options:["Newton's First Law","Newton's Third Law","Law of Conservation of Momentum","Hooke's Law"],correct:2,explanation:"The Law of Conservation of Momentum: total momentum is constant when no external forces act."},
          {type:"tf", text:"Nuclear fission involves combining two light nuclei to form a heavier nucleus.",options:["True","False"],correct:1,explanation:"That describes nuclear fusion. Fission splits a heavy nucleus into smaller ones."},
          {type:"mcq",text:"The frequency and wavelength of a wave are:",options:["Directly proportional","Inversely proportional","Equal","Unrelated"],correct:1,explanation:"v = f\u03bb; for constant wave speed, frequency and wavelength are inversely proportional."},
          {type:"tf", text:"Transformers work on DC (direct current) supply.",options:["True","False"],correct:1,explanation:"Transformers operate on AC; DC produces no changing magnetic flux."},
          {type:"mcq",text:"The unit of magnetic flux density is:",options:["Tesla","Weber","Henry","Farad"],correct:0,explanation:"Magnetic flux density is measured in Teslas (T)."},
          {type:"tf", text:"In simple harmonic motion, the restoring force is proportional to displacement.",options:["True","False"],correct:0,explanation:"SHM: F = \u2212kx; restoring force is proportional to displacement."},
          {type:"mcq",text:"What phenomenon explains why a straw appears bent in water?",options:["Reflection","Diffraction","Refraction","Interference"],correct:2,explanation:"Refraction \u2014 bending of light as it passes from water to air."},
          {type:"tf", text:"The photoelectric effect can be explained using the wave theory of light.",options:["True","False"],correct:1,explanation:"The photoelectric effect requires the photon (particle) theory; wave theory fails to explain it."},
          {type:"mcq",text:"A capacitor stores energy in:",options:["A magnetic field","A gravitational field","An electric field","A thermal field"],correct:2,explanation:"A capacitor stores energy in the electric field between its plates."}
        ]
      },
      {
        code:"STA 112", name:"Introduction to Statistics",
        questions:[
          {type:"mcq",text:"Which measure of central tendency is most affected by extreme values?",options:["Mode","Median","Mean","Range"],correct:2,explanation:"The mean uses all data values, so outliers pull it significantly."},
          {type:"tf", text:"The median is always one of the values in the dataset.",options:["True","False"],correct:1,explanation:"For an even number of data points, the median is the average of the two middle values."},
          {type:"mcq",text:"Probability of getting a head when a fair coin is tossed:",options:["0","0.25","0.5","1"],correct:2,explanation:"P(head) = 1/2 = 0.5 for a fair coin."},
          {type:"tf", text:"The sum of all probabilities in a probability distribution equals 1.",options:["True","False"],correct:0,explanation:"By definition, total probability across all outcomes sums to 1."},
          {type:"mcq",text:"Which of these is a measure of dispersion?",options:["Mean","Mode","Standard Deviation","Median"],correct:2,explanation:"Standard deviation measures how spread out data values are from the mean."},
          {type:"tf", text:"A bar chart is suitable for displaying continuous data.",options:["True","False"],correct:1,explanation:"Histograms are used for continuous data; bar charts are for categorical data."},
          {type:"mcq",text:"If P(A)=0.4 and P(B)=0.3 and they are mutually exclusive, P(A\u222aB)=?",options:["0.12","0.7","0.58","1.0"],correct:1,explanation:"For mutually exclusive events: P(A\u222aB) = P(A) + P(B) = 0.7."},
          {type:"tf", text:"Variance is the square root of the standard deviation.",options:["True","False"],correct:1,explanation:"Standard deviation is the square root of variance, not the other way."},
          {type:"mcq",text:"In a normal distribution, ~what % of data falls within one standard deviation?",options:["50%","68%","95%","99.7%"],correct:1,explanation:"Empirical rule: ~68% within \u00b11\u03c3, ~95% within \u00b12\u03c3, ~99.7% within \u00b13\u03c3."},
          {type:"tf", text:"A scatter plot can show the relationship between two variables.",options:["True","False"],correct:0,explanation:"Scatter plots display pairs of data to reveal correlations between two variables."},
          {type:"mcq",text:"The mode of {3,5,5,7,9,9,9,11} is:",options:["5","7","9","11"],correct:2,explanation:"9 appears three times \u2014 more than any other value."},
          {type:"tf", text:"Correlation implies causation.",options:["True","False"],correct:1,explanation:"Two variables may be correlated without one causing the other."},
          {type:"mcq",text:"Which sampling method gives every member an equal chance of selection?",options:["Convenience sampling","Stratified sampling","Systematic sampling","Simple random sampling"],correct:3,explanation:"Simple random sampling ensures every individual has an equal and independent chance."},
          {type:"tf", text:"A frequency distribution table can help identify the mode.",options:["True","False"],correct:0,explanation:"The mode is the value with the highest frequency, visible in a frequency table."},
          {type:"mcq",text:"The interquartile range (IQR) is calculated as:",options:["Q1 \u2212 Q3","Q3 \u2212 Q1","Q2 \u2212 Q1","Q3 \u2212 Q2"],correct:1,explanation:"IQR = Q3 \u2212 Q1, representing the middle 50% spread of the data."}
        ]
      }
    ];

    let activeCourse = null, qIndex = 0, selectedIdx = null, revealed = false, score = 0;

    const courseScreen = document.getElementById("course-screen");
    const quizScreen   = document.getElementById("quiz-screen");
    const scoreScreen  = document.getElementById("score-screen");

    function showScreen(w) {
      courseScreen.style.display = w==="course" ? "block":"none";
      quizScreen.style.display   = w==="quiz"   ? "block":"none";
      scoreScreen.style.display  = w==="score"  ? "block":"none";
    }

    function buildGrid() {
      const grid = document.getElementById("course-grid");
      grid.innerHTML = "";
      courses.forEach((c,i) => {
        const btn = document.createElement("button");
        btn.className = "course-card";
        btn.innerHTML = `<div class="course-code">${c.code}</div><div class="course-name">${c.name}</div><div class="course-meta">${c.questions.length} questions &middot; Mix</div>`;
        btn.addEventListener("click", () => startQuiz(i));
        grid.appendChild(btn);
      });
    }

    function startQuiz(idx) {
      activeCourse = idx; qIndex = 0; score = 0;
      showScreen("quiz"); renderQuestion();
    }

    function renderQuestion() {
      const c = courses[activeCourse], q = c.questions[qIndex];
      const num = qIndex+1, tot = c.questions.length;
      selectedIdx = null; revealed = false;

      quizScreen.classList.remove("quiz-animate");
      void quizScreen.offsetWidth;
      quizScreen.classList.add("quiz-animate");

      document.getElementById("nav-code").textContent     = c.code;
      document.getElementById("nav-progress").innerHTML = `${num} / ${tot}`;

      const dr = document.getElementById("dots-row");
      dr.innerHTML = "";
      for(let i=0;i<tot;i++){
        const d=document.createElement("div");
        d.className="dot"+(i<qIndex?" done":i===qIndex?" current":"");
        dr.appendChild(d);
      }

      document.getElementById("ghost-num").textContent  = String(num).padStart(2,"0");
      document.getElementById("type-badge").textContent = q.type==="tf"?"True / False":"Multiple Choice";
      document.getElementById("q-text").innerHTML     = q.text;

      const ol=document.getElementById("options-list");
      ol.innerHTML="";
      const L=["A","B","C","D"];
      q.options.forEach((opt,i)=>{
        const li=document.createElement("li");
        const btn=document.createElement("button");
        btn.className="opt-btn";
        btn.dataset.i=i;
        btn.innerHTML=`<span class="opt-letter">${q.type==="tf"?"":L[i]}</span><span class="opt-label">${opt}</span><span class="opt-icon">&#9679;</span>`;
        btn.addEventListener("click",()=>handleSelect(i));
        li.appendChild(btn); ol.appendChild(li);
      });
      document.getElementById("footer").innerHTML="";
    }

    function handleSelect(idx) {
      if(revealed) return;
      selectedIdx=idx;
      document.querySelectorAll(".opt-btn").forEach(b=>{ b.classList.remove("selected"); b.querySelector(".opt-icon").innerHTML="&#9679;"; });
      const chosen=document.querySelectorAll(".opt-btn")[idx];
      chosen.classList.add("selected");
      const footer=document.getElementById("footer");
      footer.innerHTML="";
      const sub=document.createElement("button");
      sub.className="submit-btn"; sub.textContent="Submit";
      sub.addEventListener("click",handleReveal);
      footer.appendChild(sub);
    }

    function handleReveal() {
      if(selectedIdx===null) return;
      revealed=true;
      const q=courses[activeCourse].questions[qIndex];
      const allBtns=document.querySelectorAll(".opt-btn");
      const isRight=selectedIdx===q.correct;
      if(isRight) score++;
      allBtns.forEach(b=>{ b.disabled=true; b.classList.remove("selected"); });
      allBtns[q.correct].classList.add("correct");
      allBtns[q.correct].querySelector(".opt-icon").textContent="✓";
      if(!isRight){ allBtns[selectedIdx].classList.add("wrong"); allBtns[selectedIdx].querySelector(".opt-icon").textContent="✗"; }
      const footer=document.getElementById("footer");
      footer.innerHTML="";
      const msg=document.createElement("span");
      msg.className="result-msg "+(isRight?"correct":"wrong");
      msg.innerHTML=(isRight?"Correct! ":"Incorrect. ")+q.explanation;
      footer.appendChild(msg);
      const total=courses[activeCourse].questions.length;
      const nxt=document.createElement("button");
      nxt.className="next-btn";
      if(qIndex<total-1){
        nxt.textContent="Next \u2192";
        nxt.addEventListener("click",()=>{ qIndex++; renderQuestion(); });
      } else {
        nxt.textContent="Finish \u2192";
        nxt.addEventListener("click",showScore);
      }
      footer.appendChild(nxt);
    }

    function showScore() {
      const c=courses[activeCourse], total=c.questions.length;
      const pct=Math.round((score/total)*100);
      let grade,gc,gb;
      if(pct>=70){grade="Pass";gc="#2D6A4F";gb="#EAF4EE";}
      else if(pct>=50){grade="Average";gc="#7B5E00";gb="#FFF8E0";}
      else{grade="Below Pass";gc="#C1121F";gb="#FDECEA";}
      document.getElementById("score-label").textContent  = c.code+" \u00b7 Quiz Complete";
      document.getElementById("score-course").textContent = c.name;
      document.getElementById("score-big").textContent    = `${score}/${total}`;
      document.getElementById("score-sub").textContent    = `${pct}% \u2014 you answered ${score} question${score!==1?"s":""} correctly`;
      const pill=document.getElementById("grade-pill");
      pill.textContent=grade;
      Object.assign(pill.style,{background:gb,color:gc,fontFamily:"var(--sans)",fontSize:"12px",fontWeight:"700",letterSpacing:"3px",textTransform:"uppercase"});
      showScreen("score");
    }

    function retryQuiz(){ startQuiz(activeCourse); }
    function goHome(){ activeCourse=null; showScreen("course"); }

    buildGrid(); showScreen("course");
    // Self-contained theme management system
const themeToggler = document.getElementById("theme-toggle");

themeToggler.addEventListener("click", () => {
  document.body.classList.toggle("dark-theme");
  
  // Cache user selection settings
  if (document.body.classList.contains("dark-theme")) {
    localStorage.setItem("selectedTheme", "dark");
  } else {
    localStorage.setItem("selectedTheme", "light");
  }
});

// Immediately initialize user theme preference checks on bootup routines
if (localStorage.getItem("selectedTheme") === "dark") {
  document.body.classList.add("dark-theme");
}
  </script>
</body>
